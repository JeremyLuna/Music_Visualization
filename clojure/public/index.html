<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Visualization (ClojureScript)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fafafa;
        }
        
        #app {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="app">
        <p>Loading app...</p>
    </div>
    
    <!-- Shadow-cljs compiled output -->
    <script src="/js/app.js"></script>
    
    <!-- Initialize the app -->
    <script>
        if (typeof app !== 'undefined' && app.core && app.core.init) {
            app.core.init();
        }
    </script>
</body>
</html>
